<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>miniRV 单周期CPU数据通路图</title>
<style>
  body { margin: 0; padding: 20px; background: #1a1a2e; display: flex; justify-content: center; }
  svg { font-family: 'Consolas', 'Microsoft YaHei', monospace; }
</style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1550 1050" width="1550" height="1050">

  <defs>
    <!-- 箭头标记 -->
    <marker id="arrow-data" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#4fc3f7"/>
    </marker>
    <marker id="arrow-addr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ffb74d"/>
    </marker>
    <marker id="arrow-ctrl" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#ef5350"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#4caf50"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1550" height="1050" fill="#1a1a2e"/>

  <!-- 标题 -->
  <text x="775" y="28" text-anchor="middle" fill="#e0e0e0" font-size="20" font-weight="bold">miniRV 单周期CPU — 数据通路图</text>
  <text x="775" y="48" text-anchor="middle" fill="#888" font-size="11">Data Path Diagram  |  PC → IMem → RF → ALU → DMem → WriteBack</text>

  <!-- ======================================================================= -->
  <!-- 辅助函数：用 path 画正交折线更方便，但需要分别写。这里用 line 组合。 -->
  <!-- 约定：线宽 w1=数据通路1.5, w2=控制线1.0, w3=地址线1.2 -->
  <!-- ======================================================================= -->

  <!-- ############################################### -->
  <!-- #  ROW 1: PC + NPC + IMem + inst_r  (y: 60~200) # -->
  <!-- ############################################### -->

  <!-- PC -->
  <rect x="60" y="70" width="120" height="65" rx="5" fill="#2d2d44" stroke="#5a5a8a" stroke-width="2.5"/>
  <text x="120" y="95" text-anchor="middle" fill="#e0e0e0" font-size="15" font-weight="bold">PC</text>
  <text x="120" y="114" text-anchor="middle" fill="#888" font-size="10">程序计数器</text>
  <text x="120" y="128" text-anchor="middle" fill="#666" font-size="9">32-bit</text>
  <!-- PC 端口标签 -->
  <text x="55" y="100" text-anchor="end" fill="#4fc3f7" font-size="9">npc_i</text>
  <text x="185" y="100" text-anchor="start" fill="#4fc3f7" font-size="9">pc_o</text>

  <!-- NPC -->
  <rect x="60" y="170" width="160" height="100" rx="5" fill="#2d2d44" stroke="#5a5a8a" stroke-width="2.5"/>
  <text x="140" y="195" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">NPC</text>
  <text x="140" y="213" text-anchor="middle" fill="#888" font-size="10">下址计算单元</text>
  <text x="140" y="229" text-anchor="middle" fill="#666" font-size="9">pc+4 / pc+imm / alu_c</text>
  <text x="140" y="245" text-anchor="middle" fill="#666" font-size="9">Branch 条件判断</text>
  <!-- NPC 输入标签 -->
  <text x="55" y="195" text-anchor="end" fill="#4fc3f7" font-size="9">pc_i</text>
  <text x="55" y="212" text-anchor="end" fill="#4fc3f7" font-size="9">imm_i</text>
  <text x="55" y="229" text-anchor="end" fill="#4fc3f7" font-size="9">alu_c_i</text>
  <text x="55" y="250" text-anchor="end" fill="#ef5350" font-size="9">npc_op</text>
  <text x="55" y="265" text-anchor="end" fill="#ef5350" font-size="9">Branch</text>
  <!-- NPC 输出标签 -->
  <text x="225" y="210" text-anchor="start" fill="#4fc3f7" font-size="9">npc_o</text>
  <text x="225" y="230" text-anchor="start" fill="#4fc3f7" font-size="9">pc4_o</text>

  <!-- IMem -->
  <rect x="250" y="70" width="110" height="65" rx="5" fill="#2d2d44" stroke="#5a5a8a" stroke-width="2.5"/>
  <text x="305" y="95" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">IMem</text>
  <text x="305" y="114" text-anchor="middle" fill="#888" font-size="10">指令存储器</text>
  <text x="305" y="128" text-anchor="middle" fill="#666" font-size="9">+ if_wrap</text>
  <text x="365" y="100" text-anchor="start" fill="#4fc3f7" font-size="9">if_inst</text>

  <!-- inst_r -->
  <rect x="420" y="70" width="100" height="65" rx="5" fill="#2d2d44" stroke="#5a5a8a" stroke-width="2.5"/>
  <text x="470" y="95" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">inst_r</text>
  <text x="470" y="114" text-anchor="middle" fill="#888" font-size="10">指令寄存器</text>
  <text x="470" y="128" text-anchor="middle" fill="#666" font-size="9">inst_vld</text>

  <!-- ===== ROW 1 连线 ===== -->

  <!-- PC → IMem (地址) -->
  <line x1="180" y1="100" x2="248" y2="100" stroke="#ffb74d" stroke-width="1.5" marker-end="url(#arrow-addr)"/>
  <text x="214" y="93" text-anchor="middle" fill="#ffb74d" font-size="8">pc[31:0]</text>

  <!-- IMem → inst_r -->
  <line x1="360" y1="100" x2="418" y2="100" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arrow-data)"/>

  <!-- PC → NPC.pc_i (反馈: PC输出 → 下 → NPC) -->
  <path d="M 120,135 L 120,155 L 140,155 L 140,168" stroke="#4fc3f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>

  <!-- NPC → PC (npc_o → PC.npc_i: NPC上方 → 左 → 上 → PC左侧) -->
  <path d="M 220,185 L 40,185 L 40,135 L 40,100 L 58,100" stroke="#4fc3f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="30" y="178" fill="#4fc3f7" font-size="8" writing-mode="tb">npc_o[31:0]</text>

  <!-- ####################################################### -->
  <!-- #  ROW 2: RF + SEXT   (y: 280~460)                     # -->
  <!-- ####################################################### -->

  <!-- RF -->
  <rect x="250" y="290" width="150" height="150" rx="6" fill="#2d2d44" stroke="#5a5a8a" stroke-width="2.5"/>
  <text x="325" y="318" text-anchor="middle" fill="#e0e0e0" font-size="15" font-weight="bold">RF</text>
  <text x="325" y="338" text-anchor="middle" fill="#888" font-size="11">寄存器堆</text>
  <text x="325" y="355" text-anchor="middle" fill="#888" font-size="11">32 × 32-bit</text>
  <text x="325" y="378" text-anchor="middle" fill="#666" font-size="9">x0=0 (只读)</text>
  <text x="325" y="396" text-anchor="middle" fill="#666" font-size="9">x1~x31</text>
  <!-- RF 端口 -->
  <text x="248" y="310" text-anchor="end" fill="#ffb74d" font-size="9">rR1[4:0]</text>
  <text x="248" y="340" text-anchor="end" fill="#ffb74d" font-size="9">rR2[4:0]</text>
  <text x="248" y="408" text-anchor="end" fill="#ffb74d" font-size="9">wR[4:0]</text>
  <text x="248" y="428" text-anchor="end" fill="#4fc3f7" font-size="9">wD[31:0]</text>
  <text x="405" y="315" text-anchor="start" fill="#4fc3f7" font-size="9">rD1[31:0]</text>
  <text x="405" y="345" text-anchor="start" fill="#4fc3f7" font-size="9">rD2[31:0]</text>

  <!-- SEXT -->
  <rect x="60" y="430" width="130" height="70" rx="5" fill="#2d2d44" stroke="#5a5a8a" stroke-width="2"/>
  <text x="125" y="456" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">SEXT</text>
  <text x="125" y="475" text-anchor="middle" fill="#888" font-size="10">立即数扩展</text>
  <text x="125" y="491" text-anchor="middle" fill="#666" font-size="9">I/S/B/U/J</text>
  <text x="55" y="465" text-anchor="end" fill="#ef5350" font-size="9">sext_op</text>
  <text x="193" y="465" text-anchor="start" fill="#4fc3f7" font-size="9">ext[31:0]</text>

  <!-- ===== inst_r → RF (读寄存器号) ===== -->
  <!-- rs1: inst[19:15] → RF.rR1 -->
  <path d="M 470,135 L 470,200 L 230,200 L 230,310 L 248,310" stroke="#ffb74d" stroke-width="1.2" fill="none" marker-end="url(#arrow-addr)"/>
  <text x="340" y="195" fill="#ffb74d" font-size="8">inst[19:15] (rs1)</text>

  <!-- rs2: inst[24:20] → RF.rR2 -->
  <path d="M 500,135 L 500,210 L 210,210 L 210,340 L 248,340" stroke="#ffb74d" stroke-width="1.2" fill="none" marker-end="url(#arrow-addr)"/>
  <text x="350" y="205" fill="#ffb74d" font-size="8">inst[24:20] (rs2)</text>

  <!-- rd: inst[11:7] → RF.wR (写回) -->
  <path d="M 520,135 L 520,420 L 248,420 L 248,408" stroke="#ffb74d" stroke-width="1.2" fill="none" marker-end="url(#arrow-addr)"/>
  <text x="440" y="415" fill="#ffb74d" font-size="8">inst[11:7] (rd)</text>

  <!-- inst[31:7] → SEXT -->
  <path d="M 470,135 L 470,240 L 30,240 L 30,465 L 58,465" stroke="#4fc3f7" stroke-width="1.2" fill="none" marker-end="url(#arrow-data)"/>
  <text x="250" y="235" fill="#4fc3f7" font-size="8">inst[31:7] (25bit)</text>

  <!-- ####################################################### -->
  <!-- #  ROW 3: MUX_A, MUX_B, ALU, DMem   (y: 500~670)     # -->
  <!-- ####################################################### -->

  <!-- MUX_A: ALU A端口选择 -->
  <polygon points="440,540 485,560 485,580 440,600" fill="#3d3d5c" stroke="#5a5a8a" stroke-width="2"/>
  <text x="462" y="556" text-anchor="middle" fill="#ccc" font-size="9">MUX</text>
  <text x="462" y="570" text-anchor="middle" fill="#ef5350" font-size="8">alua_sel</text>

  <!-- MUX_B: ALU B端口选择 -->
  <polygon points="440,610 485,630 485,650 440,670" fill="#3d3d5c" stroke="#5a5a8a" stroke-width="2"/>
  <text x="462" y="626" text-anchor="middle" fill="#ccc" font-size="9">MUX</text>
  <text x="462" y="640" text-anchor="middle" fill="#ef5350" font-size="8">alub_sel</text>

  <!-- ALU -->
  <rect x="570" y="530" width="180" height="140" rx="6" fill="#2d2d44" stroke="#5a5a8a" stroke-width="2.5"/>
  <text x="660" y="558" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">ALU</text>
  <text x="660" y="578" text-anchor="middle" fill="#888" font-size="11">运算器</text>
  <text x="660" y="596" text-anchor="middle" fill="#666" font-size="9">ADD·SUB·AND·OR·XOR</text>
  <text x="660" y="612" text-anchor="middle" fill="#666" font-size="9">SLL·SRL·SRA·SLT·SLTU</text>
  <text x="660" y="628" text-anchor="middle" fill="#666" font-size="9">MUL·MULH·DIV·REM</text>
  <text x="660" y="648" text-anchor="middle" fill="#666" font-size="9">+ MAC (乘累加)</text>
  <!-- ALU 端口 -->
  <text x="563" y="555" text-anchor="end" fill="#4fc3f7" font-size="9">A_i</text>
  <text x="563" y="610" text-anchor="end" fill="#4fc3f7" font-size="9">B_i</text>
  <text x="563" y="638" text-anchor="end" fill="#ef5350" font-size="9">alu_op</text>
  <text x="755" y="560" text-anchor="start" fill="#4fc3f7" font-size="9">C_o[31:0]</text>
  <text x="755" y="580" text-anchor="start" fill="#4fc3f7" font-size="9">lt_0</text>
  <text x="755" y="596" text-anchor="start" fill="#4fc3f7" font-size="9">eq_0</text>
  <text x="755" y="618" text-anchor="start" fill="#4fc3f7" font-size="9">busy</text>

  <!-- DMem -->
  <rect x="840" y="530" width="150" height="140" rx="6" fill="#2d2d44" stroke="#5a5a8a" stroke-width="2.5"/>
  <text x="915" y="558" text-anchor="middle" fill="#e0e0e0" font-size="15" font-weight="bold">DMem</text>
  <text x="915" y="578" text-anchor="middle" fill="#888" font-size="11">数据存储器</text>
  <text x="915" y="596" text-anchor="middle" fill="#666" font-size="9">+ DCache</text>
  <text x="915" y="618" text-anchor="middle" fill="#666" font-size="9">字节/半字/字</text>
  <!-- DMem 端口 -->
  <text x="835" y="555" text-anchor="end" fill="#ffb74d" font-size="9">addr</text>
  <text x="835" y="600" text-anchor="end" fill="#4fc3f7" font-size="9">wdata</text>
  <text x="835" y="630" text-anchor="end" fill="#ef5350" font-size="9">wen</text>
  <text x="835" y="650" text-anchor="end" fill="#ef5350" font-size="9">ren</text>
  <text x="995" y="590" text-anchor="start" fill="#4fc3f7" font-size="9">rdata</text>
  <text x="995" y="610" text-anchor="start" fill="#888" font-size="9">valid</text>

  <!-- ===== RF → MUX_A (rs1) ===== -->
  <path d="M 400,315 L 420,315 L 420,525 L 438,525" stroke="#4fc3f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="408" y="430" fill="#4fc3f7" font-size="8" writing-mode="tb">RF.rD1</text>

  <!-- ===== PC → MUX_A (AUIPC路径) ===== -->
  <path d="M 120,135 L 120,505 L 438,505" stroke="#4fc3f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="260" y="500" fill="#4fc3f7" font-size="8">PC (仅AUIPC, alua_sel=1)</text>

  <!-- MUX_A → ALU.A -->
  <line x1="485" y1="560" x2="568" y2="560" stroke="#4fc3f7" stroke-width="1.5" marker-end="url(#arrow-data)"/>

  <!-- ===== RF → MUX_B (rs2) ===== -->
  <path d="M 400,345 L 425,345 L 425,520 L 455,520 L 455,608" stroke="#4fc3f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="432" y="440" fill="#4fc3f7" font-size="8" writing-mode="tb">RF.rD2</text>

  <!-- ===== SEXT → MUX_B (立即数) ===== -->
  <path d="M 190,465 L 360,465 L 360,640 L 438,640" stroke="#4fc3f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="270" y="458" fill="#4fc3f7" font-size="8">SEXT.ext (立即数)</text>

  <!-- MUX_B → ALU.B -->
  <path d="M 485,630 L 540,630 L 540,615 L 568,615" stroke="#4fc3f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>

  <!-- ===== ALU.C → DMem.addr ===== -->
  <line x1="750" y1="565" x2="838" y2="565" stroke="#ffb74d" stroke-width="1.5" marker-end="url(#arrow-addr)"/>
  <text x="794" y="558" text-anchor="middle" fill="#ffb74d" font-size="8">addr[31:0]</text>

  <!-- ===== RF.rD2 → DMem.wdata (store) ===== -->
  <path d="M 400,345 L 425,345 L 425,490 L 800,490 L 800,610 L 838,610" stroke="#4fc3f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="612" y="483" fill="#4fc3f7" font-size="8">wdata[31:0] (store)</text>

  <!-- ####################################################### -->
  <!-- #  ROW 4: MUX_WD, Branch  (y: 710~810)                # -->
  <!-- ####################################################### -->

  <!-- MUX_WD: 写回数据4选1 -->
  <rect x="440" y="720" width="200" height="105" rx="5" fill="#3d3d5c" stroke="#5a5a8a" stroke-width="2.5"/>
  <text x="540" y="745" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">MUX_WD (4选1)</text>
  <text x="540" y="765" text-anchor="middle" fill="#ef5350" font-size="9">选择: wd_sel[1:0]</text>
  <!-- 四个输入标注 -->
  <text x="435" y="738" text-anchor="end" fill="#4fc3f7" font-size="9">00: ALU.C</text>
  <text x="435" y="755" text-anchor="end" fill="#4fc3f7" font-size="9">01: DMem.rdata</text>
  <text x="435" y="772" text-anchor="end" fill="#4fc3f7" font-size="9">10: NPC.pc4</text>
  <text x="435" y="789" text-anchor="end" fill="#4fc3f7" font-size="9">11: SEXT.ext</text>

  <!-- Branch 判断逻辑 -->
  <rect x="750" y="740" width="180" height="60" rx="5" fill="#3d3d5c" stroke="#ef5350" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="840" y="761" text-anchor="middle" fill="#ef5350" font-size="12" font-weight="bold">Branch 判断</text>
  <text x="840" y="782" text-anchor="middle" fill="#ccc" font-size="9">b[0]&amp;((b[1]&amp;(b[2]^lt))|(~b[1]&amp;(b[2]^eq)))</text>

  <!-- ===== ALU.C → MUX_WD (写回路径1: 算术结果) ===== -->
  <path d="M 750,565 L 750,700 L 560,700 L 560,718" stroke="#4fc3f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="655" y="695" fill="#4fc3f7" font-size="8">ALU.C (算术结果)</text>

  <!-- ===== DMem.rdata → MUX_WD (写回路径2: load) ===== -->
  <path d="M 990,600 L 1020,600 L 1020,755 L 642,755" stroke="#4fc3f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="1030" y="680" fill="#4fc3f7" font-size="8">rdata (load)</text>

  <!-- ===== NPC.pc4 → MUX_WD (写回路径3: JAL/JALR) ===== -->
  <path d="M 220,230 L 280,230 L 280,700 L 400,700 L 400,773 L 438,773" stroke="#4fc3f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="240" y="223" fill="#4fc3f7" font-size="8">pc4_o</text>
  <text x="310" y="470" fill="#4fc3f7" font-size="8" writing-mode="tb">pc+4 (JAL/JALR)</text>

  <!-- ===== SEXT.ext → MUX_WD (写回路径4: LUI) ===== -->
  <path d="M 190,465 L 250,465 L 250,805 L 438,805" stroke="#4fc3f7" stroke-width="1.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="260" y="630" fill="#4fc3f7" font-size="8" writing-mode="tb">SEXT.ext (LUI)</text>

  <!-- ===== MUX_WD 输出 → RF.wD (写回) ===== -->
  <path d="M 540,825 L 540,860 L 325,860 L 325,442" stroke="#4fc3f7" stroke-width="2.5" fill="none" marker-end="url(#arrow-data)"/>
  <text x="432" y="855" fill="#4fc3f7" font-size="9">wD[31:0] 写回数据</text>

  <!-- ===== ALU.lt_0, eq_0 → Branch 判断 ===== -->
  <path d="M 750,585 L 770,585 L 770,760 L 748,760" stroke="#4fc3f7" stroke-width="1.2" fill="none" marker-end="url(#arrow-data)"/>
  <text x="765" y="670" fill="#4fc3f7" font-size="8" writing-mode="tb">lt_0, eq_0</text>

  <!-- ===== ALU.C → NPC.alu_c_i (JALR) ===== -->
  <path d="M 570,650 L 540,650 L 540,860 L 100,860 L 100,272" stroke="#4fc3f7" stroke-width="1.2" fill="none" marker-end="url(#arrow-data)"/>
  <text x="320" y="855" fill="#4fc3f7" font-size="8">alu_c (JALR)</text>

  <!-- ===== SEXT.ext → NPC.imm_i (B/J型跳转偏移) ===== -->
  <path d="M 190,465 L 210,465 L 210,250 L 223,250" stroke="#4fc3f7" stroke-width="1.2" fill="none" marker-end="url(#arrow-data)"/>
  <text x="215" y="360" fill="#4fc3f7" font-size="8" writing-mode="tb">imm (B/J offset)</text>

  <!-- ===== Branch → NPC.Branch_i ===== -->
  <path d="M 750,775 L 680,775 L 680,270 L 223,270" stroke="#ef5350" stroke-width="1.2" fill="none" marker-end="url(#arrow-ctrl)" stroke-dasharray="6,3"/>
  <text x="450" y="768" fill="#ef5350" font-size="8">Branch</text>

  <!-- ####################################################### -->
  <!-- #  ROW 5: Ctrl 控制器  (y: 900~990)                   # -->
  <!-- ####################################################### -->

  <!-- Ctrl -->
  <rect x="440" y="900" width="280" height="110" rx="6" fill="#2d2d44" stroke="#ef5350" stroke-width="3"/>
  <text x="580" y="928" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">Ctrl 控制器</text>
  <text x="580" y="948" text-anchor="middle" fill="#888" font-size="11">opcode[6:0] + funct3[14:12] + funct7[31:25]</text>

  <!-- Ctrl 输出信号列表 (右侧) -->
  <text x="725" y="920" fill="#ef5350" font-size="9">10路控制信号输出:</text>
  <text x="725" y="936" fill="#ef5350" font-size="9">npc_op[0]  rf_we[0]  wd_sel[1:0]</text>
  <text x="725" y="952" fill="#ef5350" font-size="9">sext_op[2:0]  alu_op[4:0]</text>
  <text x="725" y="968" fill="#ef5350" font-size="9">alua_sel[0]  alub_sel[0]</text>
  <text x="725" y="984" fill="#ef5350" font-size="9">branch[2:0]  dram_we[0]  mul_div[0]</text>

  <!-- ===== inst_r → Ctrl (opcode + funct) ===== -->
  <path d="M 470,135 L 470,930 L 438,930" stroke="#ffb74d" stroke-width="1.2" fill="none" marker-end="url(#arrow-addr)"/>

    <tspan x="1090" dy="18">rf_we        寄存器写使能: 0/1</tspan>
    <tspan x="1090" dy="18">sext_op     立即数扩展格式: IMM_I / IMM_S / IMM_B / IMM_U / IMM_J</tspan>

    <tspan x="1090" dy="18">dram_we    数据存储器写使能: 0/1</tspan>
    <tspan x="1090" dy="18">mul_div     乘除法使能: 0/1</tspan>
    <tspan x="1070" dy="24">多路选择信号:</tspan>
    <tspan x="1090" dy="18">wd_sel      写回数据源: 00=ALU.C / 01=DMem / 10=PC+4 / 11=SEXT</tspan>
    <tspan x="1090" dy="18">alua_sel    ALU.A: 0=rs1 / 1=PC</tspan>
    <tspan x="1090" dy="18">alub_sel    ALU.B: 0=rs2 / 1=imm</tspan>
  </text>
